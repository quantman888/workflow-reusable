name: Python Package Publish Reusable Workflow

on:
  workflow_call:
    inputs:
      PYTHON_PACKAGE_REPOSITORY_URL:
        description: "Repository URL used by twine upload"
        required: true
        type: string
      PYTHON_PACKAGE_SIMPLE_URL:
        description: "Optional simple index URL used to resolve exact wheel install command"
        required: false
        type: string
        default: ""
      PYTHON_PACKAGE_TRUSTED_HOST:
        description: "Optional trusted host appended to pip install summary"
        required: false
        type: string
        default: ""
      PYTHON_PUSH_PACKAGE:
        description: "Whether to upload built distributions"
        required: false
        type: boolean
        default: true
      PYTHON_SKIP_EXISTING:
        description: "Whether existing distributions should be skipped via simple-index preflight"
        required: false
        type: boolean
        default: true
      PYTHON_VERSION:
        description: "Python version used for build/upload"
        required: false
        type: string
        default: "3.x"
      RUNS_ON_JSON:
        description: "JSON value for runs-on (for example: \"ubuntu-latest\" or [\"self-hosted\",\"linux\"])"
        required: false
        type: string
        default: '"ubuntu-latest"'
    outputs:
      package_name:
        description: "Resolved Python package name from built metadata"
        value: ${{ jobs.python_package_publish.outputs.package_name }}
      package_version:
        description: "Resolved Python package version from built metadata"
        value: ${{ jobs.python_package_publish.outputs.package_version }}
      dist_files:
        description: "Built distribution filenames as comma-separated list"
        value: ${{ jobs.python_package_publish.outputs.dist_files }}
      upload_result:
        description: "Upload result: uploaded|skipped-existing|mixed|dry-run"
        value: ${{ jobs.python_package_publish.outputs.upload_result }}
      install_command:
        description: "Exact pip install command for the resolved wheel URL"
        value: ${{ jobs.python_package_publish.outputs.install_command }}
    secrets:
      nexus_username:
        required: false
      nexus_password:
        required: false

permissions:
  contents: read

jobs:
  python_package_publish:
    name: Build And Publish Python Package
    runs-on: ${{ fromJSON(inputs.RUNS_ON_JSON) }}
    timeout-minutes: 20
    outputs:
      package_name: ${{ steps.metadata.outputs.package_name }}
      package_version: ${{ steps.metadata.outputs.package_version }}
      dist_files: ${{ steps.metadata.outputs.dist_files }}
      upload_result: ${{ steps.publish.outputs.upload_result }}
      install_command: ${{ steps.resolve_install.outputs.install_command }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.PYTHON_VERSION }}

      - name: Install build tooling
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          set -euo pipefail
          python -X utf8 -m pip install --upgrade pip
          python -X utf8 -m pip install --upgrade build twine

      - name: Build distributions
        run: |
          set -euo pipefail
          rm -rf build dist *.egg-info
          python -X utf8 -m build --sdist --wheel

      - name: Resolve package metadata
        id: metadata
        run: |
          set -euo pipefail
          python -X utf8 <<'PY'
          import email
          import hashlib
          import os
          import pathlib
          import zipfile

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          dist_dir = pathlib.Path("dist")
          wheels = sorted(dist_dir.glob("*.whl"))
          if not wheels:
            raise SystemExit("no wheel file found in dist/")

          wheel_path = wheels[0]
          with zipfile.ZipFile(wheel_path) as zf:
            metadata_name = next(
              name for name in zf.namelist() if name.endswith(".dist-info/METADATA")
            )
            metadata = email.message_from_bytes(zf.read(metadata_name))

          package_name = metadata.get("Name", "").strip()
          package_version = metadata.get("Version", "").strip()
          if not package_name or not package_version:
            raise SystemExit("failed to resolve package name/version from wheel metadata")

          dist_files = sorted(path.name for path in dist_dir.iterdir() if path.is_file())
          wheel_sha256 = hashlib.sha256(wheel_path.read_bytes()).hexdigest()
          with output_path.open("a", encoding="utf-8") as fh:
            fh.write(f"package_name={package_name}\n")
            fh.write(f"package_version={package_version}\n")
            fh.write(f"dist_files={','.join(dist_files)}\n")
            fh.write(f"wheel_filename={wheel_path.name}\n")
            fh.write(f"wheel_sha256={wheel_sha256}\n")
          PY

      - name: Resolve upload plan
        id: upload_plan
        env:
          PYTHON_SKIP_EXISTING: ${{ inputs.PYTHON_SKIP_EXISTING }}
          PYTHON_PACKAGE_SIMPLE_URL: ${{ inputs.PYTHON_PACKAGE_SIMPLE_URL }}
          PACKAGE_NAME: ${{ steps.metadata.outputs.package_name }}
          DIST_FILES: ${{ steps.metadata.outputs.dist_files }}
          TWINE_USERNAME: ${{ secrets.nexus_username }}
          TWINE_PASSWORD: ${{ secrets.nexus_password }}
        run: |
          set -euo pipefail
          python -X utf8 <<'PY'
          import base64
          import html.parser
          import os
          import pathlib
          import re
          import urllib.error
          import urllib.parse
          import urllib.request

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          skip_existing = os.environ["PYTHON_SKIP_EXISTING"] == "true"
          simple_url = os.environ["PYTHON_PACKAGE_SIMPLE_URL"].strip()
          package_name = os.environ["PACKAGE_NAME"].strip()
          dist_files = [item for item in os.environ["DIST_FILES"].split(",") if item]
          username = os.environ.get("TWINE_USERNAME", "")
          password = os.environ.get("TWINE_PASSWORD", "")

          upload_files = list(dist_files)
          existing_count = 0
          probe_mode = "disabled"

          if skip_existing and simple_url and package_name:
            probe_mode = "probe-miss"
            normalized_name = re.sub(r"[-_.]+", "-", package_name).lower()
            if not simple_url.endswith("/"):
              simple_url += "/"
            index_url = urllib.parse.urljoin(simple_url, normalized_name + "/")
            request = urllib.request.Request(index_url)
            if username or password:
              basic_auth = base64.b64encode(f"{username}:{password}".encode("utf-8")).decode("ascii")
              request.add_header("Authorization", f"Basic {basic_auth}")

            try:
              with urllib.request.urlopen(request, timeout=20) as response:
                html_body = response.read().decode("utf-8", errors="replace")
            except urllib.error.HTTPError as exc:
              if exc.code == 404:
                html_body = ""
              else:
                probe_mode = f"http-{exc.code}"
                html_body = None
            except Exception:
              probe_mode = "unavailable"
              html_body = None

            if html_body is not None:
              class LinkParser(html.parser.HTMLParser):
                def __init__(self) -> None:
                  super().__init__()
                  self.files: set[str] = set()

                def handle_starttag(self, tag: str, attrs) -> None:
                  if tag != "a":
                    return
                  href = dict(attrs).get("href", "")
                  if not href:
                    return
                  parsed = urllib.parse.urlparse(href)
                  candidate = pathlib.PurePosixPath(
                    urllib.parse.unquote(parsed.path)
                  ).name.strip()
                  if candidate:
                    self.files.add(candidate)

              parser = LinkParser()
              parser.feed(html_body)
              upload_files = [name for name in dist_files if name not in parser.files]
              existing_count = len(dist_files) - len(upload_files)
              if existing_count == 0:
                probe_mode = "none-present"
              elif existing_count == len(dist_files):
                probe_mode = "all-present"
              else:
                probe_mode = "partial-present"
          elif skip_existing:
            probe_mode = "no-simple-index"

          with output_path.open("a", encoding="utf-8") as fh:
            fh.write(f"probe_mode={probe_mode}\n")
            fh.write(f"existing_file_count={existing_count}\n")
            fh.write("upload_files<<EOF\n")
            for filename in upload_files:
              fh.write(f"dist/{filename}\n")
            fh.write("EOF\n")
          PY

      - name: Upload distributions
        id: publish
        env:
          PYTHON_PUSH_PACKAGE: ${{ inputs.PYTHON_PUSH_PACKAGE }}
          PYTHON_PACKAGE_REPOSITORY_URL: ${{ inputs.PYTHON_PACKAGE_REPOSITORY_URL }}
          DIST_FILES: ${{ steps.metadata.outputs.dist_files }}
          EXISTING_FILE_COUNT: ${{ steps.upload_plan.outputs.existing_file_count }}
          UPLOAD_FILES: ${{ steps.upload_plan.outputs.upload_files }}
          TWINE_USERNAME: ${{ secrets.nexus_username }}
          TWINE_PASSWORD: ${{ secrets.nexus_password }}
        run: |
          set -euo pipefail

          if [[ "${PYTHON_PUSH_PACKAGE}" != "true" ]]; then
            echo "upload_result=dry-run" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t upload_files < <(printf '%s\n' "${UPLOAD_FILES}" | sed '/^$/d')
          if (( ${#upload_files[@]} == 0 )); then
            echo "upload_result=skipped-existing" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          upload_log="$(mktemp)"
          trap 'rm -f "${upload_log}"' EXIT

          python -X utf8 -m twine upload \
            --repository-url "${PYTHON_PACKAGE_REPOSITORY_URL}" \
            "${upload_files[@]}" 2>&1 | tee "${upload_log}"

          upload_result="uploaded"
          if [[ "${EXISTING_FILE_COUNT:-0}" != "0" ]]; then
            upload_result="mixed"
          fi

          echo "upload_result=${upload_result}" >> "${GITHUB_OUTPUT}"

      - name: Resolve exact install command
        id: resolve_install
        if: ${{ always() && steps.publish.outcome == 'success' }}
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.package_name }}
          PYTHON_PACKAGE_SIMPLE_URL: ${{ inputs.PYTHON_PACKAGE_SIMPLE_URL }}
          PYTHON_PACKAGE_TRUSTED_HOST: ${{ inputs.PYTHON_PACKAGE_TRUSTED_HOST }}
          WHEEL_FILENAME: ${{ steps.metadata.outputs.wheel_filename }}
          WHEEL_SHA256: ${{ steps.metadata.outputs.wheel_sha256 }}
          TWINE_USERNAME: ${{ secrets.nexus_username }}
          TWINE_PASSWORD: ${{ secrets.nexus_password }}
        run: |
          set -euo pipefail
          python -X utf8 <<'PY'
          import base64
          import hashlib
          import html.parser
          import os
          import pathlib
          import re
          import shlex
          import urllib.parse
          import urllib.request

          output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          package_name = os.environ["PACKAGE_NAME"].strip()
          simple_url = os.environ["PYTHON_PACKAGE_SIMPLE_URL"].strip()
          trusted_host = os.environ["PYTHON_PACKAGE_TRUSTED_HOST"].strip()
          wheel_filename = os.environ["WHEEL_FILENAME"].strip()
          local_wheel_sha256 = os.environ["WHEEL_SHA256"].strip()
          username = os.environ.get("TWINE_USERNAME", "")
          password = os.environ.get("TWINE_PASSWORD", "")

          install_command = ""
          if package_name and simple_url and wheel_filename:
            try:
              normalized_name = re.sub(r"[-_.]+", "-", package_name).lower()
              if not simple_url.endswith("/"):
                simple_url += "/"
              index_url = urllib.parse.urljoin(simple_url, normalized_name + "/")

              def build_request(url: str) -> urllib.request.Request:
                request = urllib.request.Request(url)
                if username or password:
                  token = base64.b64encode(f"{username}:{password}".encode("utf-8")).decode("ascii")
                  request.add_header("Authorization", f"Basic {token}")
                return request

              with urllib.request.urlopen(build_request(index_url), timeout=20) as response:
                html_body = response.read().decode("utf-8", errors="replace")

              class LinkParser(html.parser.HTMLParser):
                def __init__(self) -> None:
                  super().__init__()
                  self.hrefs: list[str] = []

                def handle_starttag(self, tag: str, attrs) -> None:
                  if tag != "a":
                    return
                  href = dict(attrs).get("href", "")
                  if href:
                    self.hrefs.append(href)

              parser = LinkParser()
              parser.feed(html_body)

              matched_href = ""
              for href in parser.hrefs:
                parsed_href = urllib.parse.urlparse(href)
                candidate = pathlib.PurePosixPath(
                  urllib.parse.unquote(parsed_href.path)
                ).name.strip()
                if candidate == wheel_filename:
                  matched_href = href
                  break

              if matched_href:
                resolved_url = urllib.parse.urljoin(index_url, matched_href)
                parsed_url = urllib.parse.urlparse(resolved_url)
                wheel_url = urllib.parse.urlunparse(parsed_url._replace(fragment=""))

                remote_sha256 = ""
                for fragment_item in parsed_url.fragment.split("&"):
                  if fragment_item.startswith("sha256="):
                    remote_sha256 = fragment_item.split("=", 1)[1].strip()
                    break

                if not remote_sha256:
                  with urllib.request.urlopen(build_request(wheel_url), timeout=30) as response:
                    remote_sha256 = hashlib.sha256(response.read()).hexdigest()

                final_sha256 = remote_sha256 or local_wheel_sha256
                if final_sha256:
                  wheel_url = f"{wheel_url}#sha256={final_sha256}"

                command_parts = ["pip", "install"]
                command_parts.extend(["--index-url", simple_url])
                if trusted_host:
                  command_parts.extend(["--trusted-host", trusted_host])
                command_parts.append(wheel_url)
                install_command = shlex.join(command_parts)
            except Exception:
              install_command = ""

          with output_path.open("a", encoding="utf-8") as fh:
            fh.write(f"install_command={install_command}\n")
          PY

      - name: Publish summary
        if: ${{ always() }}
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.metadata.outputs.package_version }}
          INSTALL_COMMAND: ${{ steps.resolve_install.outputs.install_command }}
        run: |
          set -euo pipefail

          {
            echo "### Published Python Package"
            echo ""
            echo "- package: \`${PACKAGE_NAME}\`"
            echo "- version: \`${PACKAGE_VERSION}\`"

            if [[ -n "${INSTALL_COMMAND}" ]]; then
              echo "- pip_install: \`${INSTALL_COMMAND}\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
