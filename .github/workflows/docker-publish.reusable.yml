name: Docker Publish Reusable

on:
  workflow_call:
    inputs:
      registry:
        description: "Docker registry host (for example: nexus.example.com)"
        required: true
        type: string
      image_name:
        description: "Image repository/name (for example: team/app)"
        required: true
        type: string
      dockerfile_path:
        description: "Dockerfile path"
        required: false
        type: string
        default: "Dockerfile"
      build_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      target_platforms:
        description: "Target platforms"
        required: false
        type: string
        default: "linux/amd64"
      build_args:
        description: "Build args, newline-delimited KEY=VALUE entries"
        required: false
        type: string
        default: ""
      publish_latest:
        description: "Whether to publish latest on main/workflow_dispatch"
        required: false
        type: boolean
        default: true
    secrets:
      nexus_username:
        required: true
      nexus_password:
        required: true

  workflow_dispatch:
    inputs:
      registry:
        description: "Docker registry host (for example: nexus.example.com)"
        required: true
        type: string
      image_name:
        description: "Image repository/name (for example: team/app)"
        required: true
        type: string
      dockerfile_path:
        description: "Dockerfile path"
        required: false
        type: string
        default: "Dockerfile"
      build_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      target_platforms:
        description: "Target platforms"
        required: false
        type: string
        default: "linux/amd64"
      build_args:
        description: "Build args, newline-delimited KEY=VALUE entries"
        required: false
        type: string
        default: ""
      publish_latest:
        description: "Whether to publish latest on main/workflow_dispatch"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image_name }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          image_ref="${REGISTRY%/}/${IMAGE_NAME}"
          short_sha="${GITHUB_SHA:0:7}"
          sha_tag="sha-${short_sha}"

          tags=("${image_ref}:${sha_tag}")

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            tags+=("${image_ref}:${release_tag}")
          fi

          if [[ "${PUBLISH_LATEST}" == "true" ]]; then
            if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              tags+=("${image_ref}:latest")
            fi
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Nexus registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.nexus_username }}
          password: ${{ secrets.nexus_password }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.target_platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ inputs.build_args }}
