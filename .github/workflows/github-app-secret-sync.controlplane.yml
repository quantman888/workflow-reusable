name: GitHub App Secret Sync Control Plane

on:
  workflow_dispatch:
    inputs:
      target_visibility:
        description: "Repository visibility to sync"
        required: false
        default: "private"
        type: choice
        options:
          - private
          - all
      repository_filter:
        description: "Optional regex applied to owner/repo"
        required: false
        default: ""
        type: string
      dry_run:
        description: "List target repositories without writing secrets"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

jobs:
  sync_repo_secrets:
    name: Sync GH_APP_* To Target Repositories
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Generate GitHub App control-plane token
        id: app_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-secrets: write

      - name: Sync repository secrets
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          ORG_NAME: ${{ github.repository_owner }}
          TARGET_VISIBILITY: ${{ github.event.inputs.target_visibility || 'private' }}
          REPOSITORY_FILTER: ${{ github.event.inputs.repository_filter || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GH_APP_ID_VALUE: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY_VALUE: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          repo_json="$(
            gh api \
              --paginate \
              -H 'Accept: application/vnd.github+json' \
              "/orgs/${ORG_NAME}/repos?per_page=100&type=all"
          )"

          mapfile -t repos < <(
            jq -sr \
              --arg visibility "${TARGET_VISIBILITY}" \
              '
                add
                | map(select(.archived == false))
                | map(select($visibility == "all" or .visibility == $visibility))
                | map(.full_name)
                | .[]
              ' <<<"${repo_json}"
          )

          if [[ -n "${REPOSITORY_FILTER}" ]]; then
            mapfile -t repos < <(printf '%s\n' "${repos[@]}" | grep -E "${REPOSITORY_FILTER}" || true)
          fi

          if [[ ${#repos[@]} -eq 0 ]]; then
            echo "No repositories matched the sync scope." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          echo "### GitHub App secret sync" >> "${GITHUB_STEP_SUMMARY}"
          echo "- org: ${ORG_NAME}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- visibility: ${TARGET_VISIBILITY}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- dry_run: ${DRY_RUN}" >> "${GITHUB_STEP_SUMMARY}"
          if [[ -n "${REPOSITORY_FILTER}" ]]; then
            echo "- repository_filter: ${REPOSITORY_FILTER}" >> "${GITHUB_STEP_SUMMARY}"
          fi
          echo "- matched_repositories: ${#repos[@]}" >> "${GITHUB_STEP_SUMMARY}"
          echo >> "${GITHUB_STEP_SUMMARY}"

          synced_count=0
          for repo in "${repos[@]}"; do
            if [[ "${DRY_RUN}" == 'true' ]]; then
              echo "- dry-run: ${repo}" >> "${GITHUB_STEP_SUMMARY}"
              continue
            fi

            gh secret set GH_APP_ID --repo "${repo}" --body "${GH_APP_ID_VALUE}"
            gh secret set GH_APP_PRIVATE_KEY --repo "${repo}" --body "${GH_APP_PRIVATE_KEY_VALUE}"
            synced_count=$((synced_count + 1))
            echo "- synced: ${repo}" >> "${GITHUB_STEP_SUMMARY}"
          done

          if [[ "${DRY_RUN}" != 'true' ]]; then
            echo >> "${GITHUB_STEP_SUMMARY}"
            echo "- synced_count: ${synced_count}" >> "${GITHUB_STEP_SUMMARY}"
          fi
